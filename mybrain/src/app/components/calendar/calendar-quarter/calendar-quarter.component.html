<div class="quarter-view">
    <div class="top-bar">
        @for (goal of quarterGoals(); track $index) {
            <div class="quarter-goal">
                <app-calendar-goal [self]="goal"></app-calendar-goal>
            </div>    
        }
        <app-add-button class="add-button"></app-add-button>
    </div>
    <div class="calendar">
        
        @for (month of quarter(); track $index) {
            <div class="month">
                <div class="tile">       
                    <div class="tile-header">
                        <p>{{month[0]}}</p>
                    </div>
                    
                    <div class="week-goal-container">
                        @for (week of month[2]; track $index) {
                            <div class="week-goals">
                                <div class="week-goal-header">
                                    <p>W{{$index+1}}</p>
                                </div>
                                @for (goal of week; track $index) {
                                    <div class="week-goal">
                                        <app-calendar-goal [self]="goal"></app-calendar-goal>
                                    </div>
                                }
                            </div>
                        }
                    </div>
                </div>

                <div class="side-bar">
                    @for (goal of month[1]; track $index) {
                        <app-calendar-goal class="month-goal" [self]="goal"></app-calendar-goal>
                    }
                </div>
            </div>
        }
        
        
    </div>
</div>
