@if (popup[0] === "add") {
    <app-add-window (close)="closePopup()"></app-add-window>
}
@else if (popup[0] !== "") {
    <app-item-overview [itemType]="popup[0]" [item]="popup[1]" (close)="closePopup()"></app-item-overview>
}

<div class="week-view">
    <div class="topbar">
        @for (goal of goals(); track $index) {
            <div class="goal">
                <app-calendar-goal [title]="goal.title" [type]="goal.type"  (click)="openPopup('goal', goal)"></app-calendar-goal>
            </div>
        }
        <p class="add-button"  (click)="openPopup('add')">+</p>
        
    </div>

    <div class="tile-container">
        
        @for (day of week; track day; let weekDayIndex = $index) {
            <div class="tile" [class.active]="todayIndex === weekDayIndex">
            
                <div class="header">
                    <p class="title">{{day}}</p>
                    <p class="add-button" (click)="openPopup('add')">+</p>
                    
                    
                </div>
            
                <div class="content">
                    
                    <div class="action-container">
                        @for (action of actions(); track $index) {
                            <div class="action">
                                <app-calendar-action [title]="action.title" (click)="openPopup('action', action)"></app-calendar-action>     
                            </div>
                        }    
                    </div>        

                    <div class="todo-container">
                        @for (todo of todos[weekDayIndex]; track $index) {
                            <div class="todo">
                                <app-calendar-todo [title]="todo.title" (click)="openPopup('todo', todo)"></app-calendar-todo>
                            </div>
                        }
                    </div>
                </div>
            </div>
        }
    </div>
    
    
</div>
